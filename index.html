<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わんこと行く那須高原マップ | Fun Dog Villa Nasu</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:        #2A5F3F;
      --green-light:  #3A7D52;
      --green-dark:   #1A3D28;
      --sand:         #F7F2EA;
      --sand-dark:    #EDE7DC;
      --amber:        #C98B35;
      --amber-light:  #E5A84E;
      --white:        #FFFFFF;
      --text:         #2C2C2C;
      --text-mid:     #555;
      --text-light:   #888;
      --border:       #E2DBD0;
      --villa-red:    #C41230;
      --villa-gold:   #FFD700;

      --cat-cafe-bg:    #FDF0E0;
      --cat-cafe-text:  #7A4010;
      --cat-cafe-border:#E5A060;
      --cat-run-bg:     #E5F5ED;
      --cat-run-text:   #1A6B3A;
      --cat-run-border: #60BF88;
      --cat-rest-bg:    #FEF0F0;
      --cat-rest-text:  #9B2030;
      --cat-rest-border:#E07080;
      --cat-nat-bg:     #EAF4FB;
      --cat-nat-text:   #1A5B8A;
      --cat-nat-border: #70B8E0;

      --shadow-sm: 0 1px 4px rgba(0,0,0,.08);
      --shadow-md: 0 3px 12px rgba(0,0,0,.12);
      --shadow-lg: 0 6px 24px rgba(0,0,0,.14);
      --radius:    12px;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3',
                   'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: var(--sand);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
      color: var(--white);
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      z-index: 200;
    }

    .hd-paw { font-size: 32px; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.3)); }
    .hd-titles { flex: 1; min-width: 0; }
    .hd-titles h1 { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hd-titles p  { font-size: 11px; opacity: .78; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .hd-badge {
      background: var(--amber);
      color: var(--white);
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }

    /* ─── FILTER BAR ──────────────────────────────────── */
    .filter-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      flex-shrink: 0;
      z-index: 199;
    }

    .filter-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

    .fbtn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 2px solid transparent;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      background: var(--sand-dark);
      color: var(--text-mid);
      font-family: inherit;
    }

    .fbtn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .fbtn[data-cat="cafe"]       { background: var(--cat-cafe-bg); color: var(--cat-cafe-text); border-color: var(--cat-cafe-border); }
    .fbtn[data-cat="dogrun"]     { background: var(--cat-run-bg);  color: var(--cat-run-text);  border-color: var(--cat-run-border); }
    .fbtn[data-cat="restaurant"] { background: var(--cat-rest-bg); color: var(--cat-rest-text); border-color: var(--cat-rest-border); }
    .fbtn[data-cat="nature"]     { background: var(--cat-nat-bg);  color: var(--cat-nat-text);  border-color: var(--cat-nat-border); }
    .fbtn:not(.active) { opacity: .55; }
    .fbtn.active { opacity: 1; box-shadow: var(--shadow-md); transform: none; }
    .fbtn[data-cat="all"].active { background: var(--green); color: var(--white); border-color: transparent; }

    /* ─── MAIN LAYOUT ────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ─── SIDEBAR ────────────────────────────────────── */
    .sidebar {
      background: var(--sand);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--amber-light); border-radius: 2px; }

    /* ─── VILLA CARD ─────────────────────────────────── */
    .villa-card {
      background: linear-gradient(135deg, #2a0a0e 0%, #7a1020 60%, #9b1828 100%);
      color: var(--white);
      padding: 14px;
      margin: 10px 10px 0;
      border-radius: var(--radius);
      border: 2px solid var(--villa-gold);
      box-shadow: 0 4px 20px rgba(180,10,30,.35);
      cursor: pointer;
      transition: box-shadow .2s, transform .15s;
    }

    .villa-card:hover { box-shadow: 0 6px 28px rgba(180,10,30,.5); transform: translateY(-2px); }

    .villa-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

    .villa-star {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #3EC6E0 0%, #45C4A0 100%);
      border: 2px solid #FFFFFF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(62,198,224,.5);
      animation: villa-pulse-fresh 2.8s ease-in-out infinite;
    }

    .villa-card-meta { flex: 1; min-width: 0; }

    .villa-card-name {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      line-height: 1.25;
    }

    .villa-card-name:hover { text-decoration: underline; }

    .villa-card-sub { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 2px; }

    .villa-home-badge {
      background: var(--villa-gold);
      color: #6B1010;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .villa-card-desc {
      font-size: 12px;
      color: rgba(255,255,255,.8);
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .villa-book-btn {
      display: inline-block;
      background: var(--villa-gold);
      color: #7A0F1E;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: background .15s, transform .1s;
    }

    .villa-book-btn:hover { background: #FFC200; transform: translateY(-1px); }

    /* ─── SPOT LIST ──────────────────────────────────── */
    .list-header {
      padding: 10px 14px 5px;
      font-size: 11px;
      color: var(--text-light);
      font-weight: 600;
      flex-shrink: 0;
    }

    .cards-wrap { padding: 0 10px 12px; display: flex; flex-direction: column; gap: 8px; }

    /* ─── SPOT CARD ──────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 13px 14px;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: var(--shadow-sm);
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }

    .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

    .card.selected {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(42,95,63,.1), var(--shadow-md);
    }

    .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 7px; }

    .card-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .card-icon.cafe       { background: var(--cat-cafe-bg); }
    .card-icon.dogrun     { background: var(--cat-run-bg); }
    .card-icon.restaurant { background: var(--cat-rest-bg); }
    .card-icon.nature     { background: var(--cat-nat-bg); }

    .card-meta { flex: 1; min-width: 0; }

    .card-name { font-size: 14px; font-weight: 700; line-height: 1.3; color: var(--text); }

    .cat-badge {
      display: inline-block;
      margin-top: 3px;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }

    .cat-badge.cafe       { background: var(--cat-cafe-bg); color: var(--cat-cafe-text); }
    .cat-badge.dogrun     { background: var(--cat-run-bg);  color: var(--cat-run-text); }
    .cat-badge.restaurant { background: var(--cat-rest-bg); color: var(--cat-rest-text); }
    .cat-badge.nature     { background: var(--cat-nat-bg);  color: var(--cat-nat-text); }

    .card-desc  { font-size: 12px; color: var(--text-mid); line-height: 1.65; margin-bottom: 6px; }
    .card-addr  { font-size: 11px; color: var(--text-light); margin-bottom: 7px; }
    .card-tags  { display: flex; flex-wrap: wrap; gap: 4px; }

    .tag {
      background: var(--sand-dark);
      color: var(--text-mid);
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 500;
    }

    /* ─── MAP ────────────────────────────────────────── */
    .map-area { position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ─── LEAFLET OVERRIDES ──────────────────────────── */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      border: 1px solid var(--border);
      font-family: inherit;
    }

    .leaflet-popup-content { margin: 12px 15px; min-width: 190px; }
    .leaflet-popup-tip-container { margin-top: -1px; }

    .popup-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 3px; }

    .popup-cat {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .popup-cat.cafe       { background: var(--cat-cafe-bg); color: var(--cat-cafe-text); }
    .popup-cat.dogrun     { background: var(--cat-run-bg);  color: var(--cat-run-text); }
    .popup-cat.restaurant { background: var(--cat-rest-bg); color: var(--cat-rest-text); }
    .popup-cat.nature     { background: var(--cat-nat-bg);  color: var(--cat-nat-text); }

    .popup-addr { font-size: 11px; color: var(--text-light); }

    /* Villa popup */
    .popup-villa { line-height: 1.5; }

    .popup-villa-star { font-size: 18px; color: var(--villa-gold); margin-bottom: 3px; }

    .popup-villa-name { font-weight: 700; font-size: 15px; }
    .popup-villa-name a { color: var(--villa-red); text-decoration: none; }
    .popup-villa-name a:hover { text-decoration: underline; }

    .popup-villa-sub { font-size: 11px; color: var(--text-light); margin: 3px 0 8px; }

    .popup-book-btn {
      display: inline-block;
      background: var(--villa-red);
      color: var(--white);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: background .15s;
    }

    .popup-book-btn:hover { background: #a00e28; }

    /* Custom map markers */
    .lf-pin {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      border: 2.5px solid var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
      cursor: pointer;
    }

    .lf-pin.cafe       { background: var(--cat-cafe-bg); }
    .lf-pin.dogrun     { background: var(--cat-run-bg); }
    .lf-pin.restaurant { background: var(--cat-rest-bg); }
    .lf-pin.nature     { background: var(--cat-nat-bg); }

    .lf-pin.villa {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #3EC6E0 0%, #45C4A0 100%);
      border: 3px solid #FFFFFF;
      font-size: 26px;
      box-shadow: 0 3px 16px rgba(62,198,224,.55);
      animation: villa-pulse-fresh 2.8s ease-in-out infinite;
    }

    @keyframes villa-pulse-fresh {
      0%, 100% { box-shadow: 0 3px 14px rgba(62,198,224,.5); }
      50%       { box-shadow: 0 3px 14px rgba(62,198,224,.5), 0 0 0 7px rgba(62,198,224,.2); }
    }

    /* ─── EMPTY STATE ─────────────────────────────────── */
    .empty { padding: 40px 20px; text-align: center; color: var(--text-light); }
    .empty .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .empty p { font-size: 14px; }

    /* ─── MOBILE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      body { overflow: auto; height: auto; }

      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 300px auto;
        overflow: visible;
      }

      .map-area { height: 300px; order: 1; }
      .sidebar  { order: 2; overflow-y: visible; height: auto; }

      header { height: 56px; padding: 0 14px; }
      .hd-titles h1 { font-size: 15px; }
      .hd-badge { display: none; }

      .filter-bar { padding: 8px 12px; }
      .fbtn { font-size: 11px; padding: 4px 10px; }
      .card { padding: 11px 12px; }
      .card-name { font-size: 13px; }
    }

    @media (max-width: 420px) {
      .hd-titles p { display: none; }
    }
  </style>
</head>

</div>

    {
      id: 9,
      name: "那須ドッグデッキガーデン",
      cat: "dogrun",
      icon: "🏃",
      desc: "大型犬に特化した貸切ドッグラン。砂地レーン3本＋フリーエリア。1時間2,750円（1頭）。外デッキのみ犬同伴可のカフェも併設。火曜定休。",
      addr: "那須郡那須町高久丙5197",
      lat: 37.066, lng: 140.045,
      tags: ["大型犬向け", "貸切ラン", "デッキカフェ併設"],
    },
    {
      id: 10,
      name: "那須自然研究路（弁天吊橋コース）",
      cat: "nature",
      icon: "🌲",
      desc: "那須高原ビジターセンターを起点とする国立公園内の遊歩道。全長約3kmで無料。リード必須で犬と散策可能。全長65mの弁天吊橋を含む人気コース。",
      addr: "那須郡那須町湯本207-2（那須高原ビジターセンター付近）",
      lat: 37.096819, lng: 140.004349,
      tags: ["リード必須", "無料", "弁天吊橋コース"],
    },
    {
      id: 11,
      name: "フィンランドの森 ハンモックカフェ",
      cat: "cafe",
      icon: "🪑",
      desc: "北欧フィンランドをイメージした森の中に佇むユニークなカフェ。ハンモックに揺られながらコーヒーを楽しめる癒しの空間。愛犬と一緒にテラスでのんびり過ごせます。",
      addr: "那須郡那須町高久乙2730-7",
      lat: 37.053327, lng: 140.014375,
      tags: ["ペット同伴可", "テラス席", "ハンモック体験"],
    },
    {
      id: 12,
      name: "NASU FARM VILLAGE",
      cat: "nature",
      icon: "🐄",
      desc: "東京ドーム11個分の広大な敷地を誇る農場テーマパーク。引退した競走馬の第二の人生を支える施設。愛犬は指定エリアで同伴可（厩舎内は馬が驚くため立入不可）。特定日開催の「DOG DAY」では犬と一緒にトレッキングコースを散策できます。",
      addr: "大田原市狭原1298-1",
      lat: 36.840382, lng: 140.102363,
      tags: ["一部エリア犬同伴可", "厩舎内犬不可", "DOG DAYイベントあり"],
    },
  ];

  const catLabel = {
    cafe: "ドッグカフェ", dogrun: "ドッグラン",
    restaurant: "ペット可レストラン", nature: "自然散歩コース",
  };

  // ── MAP INIT ─────────────────────────────────────────
  const map = L.map("map", { zoomControl: true }).setView([37.1020605, 140.0416517], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  }).addTo(map);

  function makeIcon(cls, emoji, size) {
    return L.divIcon({
      className: "",
      html: `<div class="lf-pin ${cls}">${emoji}</div>`,
      iconSize:   [size, size],
      iconAnchor: [size / 2, size / 2],
      popupAnchor:[0, -(size / 2 + 4)],
    });
  }

  // ── VILLA MARKER ─────────────────────────────────────
  const villaIcon = makeIcon("villa", "🏡", 52);

  const villaPopupHtml = `
    <div class="popup-villa">
      <div class="popup-villa-star">🏡</div>
      <div class="popup-villa-name">
        <a href="${villa.url}" target="_blank" rel="noopener">Fun Dog Villa Nasu</a>
      </div>
      <div class="popup-villa-sub">犬と泊まれる一棟貸し別荘 · 那須高原</div>
      <a href="${villa.url}" target="_blank" rel="noopener" class="popup-book-btn">🏠 宿泊予約はこちら</a>
    </div>`;

  const villaMarker = L.marker([villa.lat, villa.lng], { icon: villaIcon, zIndexOffset: 1000 })
    .addTo(map)
    .bindPopup(villaPopupHtml, { maxWidth: 240 });

  // ── SPOT MARKERS ─────────────────────────────────────
  const markers = {};

  spots.forEach(spot => {
    const icon = makeIcon(spot.cat, spot.icon, 36);
    const popup = `
      <div class="popup-name">${spot.name}</div>
      <span class="popup-cat ${spot.cat}">${catLabel[spot.cat]}</span>
      <div class="popup-addr">📍 ${spot.addr}</div>`;

    const m = L.marker([spot.lat, spot.lng], { icon })
      .addTo(map)
      .bindPopup(popup, { maxWidth: 220 });

    m.on("click", () => highlightCard(spot.id));
    markers[spot.id] = m;
  });

  // ── STATE ────────────────────────────────────────────
  let activeFilter = "all";
  let selectedId   = null;

  // ── RENDER CARDS ─────────────────────────────────────
  function filteredSpots() {
    return activeFilter === "all" ? spots : spots.filter(s => s.cat === activeFilter);
  }

  function renderCards() {
    const list = filteredSpots();
    const wrap = document.getElementById("cardsWrap");

    document.getElementById("listHeader").textContent = `${list.length}件のスポット`;
    document.getElementById("hdBadge").textContent    = `${list.length}スポット`;
    wrap.innerHTML = "";

    if (list.length === 0) {
      wrap.innerHTML = `<div class="empty"><div class="empty-icon">🐾</div><p>該当するスポットがありません</p></div>`;
      return;
    }

    list.forEach(spot => {
      const el = document.createElement("div");
      el.className = "card" + (spot.id === selectedId ? " selected" : "");
      el.dataset.id = spot.id;
      el.innerHTML = `
        <div class="card-top">
          <div class="card-icon ${spot.cat}">${spot.icon}</div>
          <div class="card-meta">
            <div class="card-name">${spot.name}</div>
            <span class="cat-badge ${spot.cat}">${catLabel[spot.cat]}</span>
          </div>
        </div>
        <div class="card-desc">${spot.desc}</div>
        <div class="card-addr">📍 ${spot.addr}</div>
        <div class="card-tags">${spot.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>`;
      el.addEventListener("click", () => selectSpot(spot));
      wrap.appendChild(el);
    });
  }

  // ── SELECT SPOT (card click) ──────────────────────────
  function selectSpot(spot) {
    selectedId = spot.id;
    document.querySelectorAll(".card").forEach(c =>
      c.classList.toggle("selected", parseInt(c.dataset.id) === spot.id)
    );
    map.flyTo([spot.lat, spot.lng], 16, { duration: 1.0 });
    markers[spot.id].openPopup();
  }

  // ── HIGHLIGHT CARD (marker click) ────────────────────
  function highlightCard(id) {
    selectedId = id;
    document.querySelectorAll(".card").forEach(c =>
      c.classList.toggle("selected", parseInt(c.dataset.id) === id)
    );
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // ── VILLA CARD CLICK ─────────────────────────────────
  document.getElementById("villaCard").addEventListener("click", e => {
    if (e.target.closest("a")) return;
    map.flyTo([villa.lat, villa.lng], 16, { duration: 1.0 });
    villaMarker.openPopup();
  });

  // ── FILTER ───────────────────────────────────────────
  document.querySelectorAll(".fbtn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeFilter = btn.dataset.cat;
      selectedId   = null;
      document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      // Show/hide markers
      spots.forEach(spot => {
        const m = markers[spot.id];
        const visible = activeFilter === "all" || spot.cat === activeFilter;
        if (visible) { if (!map.hasLayer(m)) m.addTo(map); }
        else         { if (map.hasLayer(m))  map.removeLayer(m); }
      });

      // Fly to filtered group or overview
      const vis = filteredSpots();
      if (vis.length > 0 && activeFilter !== "all") {
        const lats = vis.map(s => s.lat);
        const lngs = vis.map(s => s.lng);
        map.flyToBounds([
          [Math.min(...lats), Math.min(...lngs)],
          [Math.max(...lats), Math.max(...lngs)],
        ], { padding: [40, 40], maxZoom: 14, duration: 1.0 });
      } else {
        map.flyTo([37.00, 140.05], 11, { duration: 1.0 });
      }

      renderCards();
    });
  });

  // ── INIT ─────────────────────────────────────────────
  renderCards();
</script>
</body>
</html>
